name: chitv_app
description: ChiTV Android app built with Flutter and Dart.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  video_player: ^2.9.2
  better_player_plus: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/icon.png
